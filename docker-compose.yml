services:
  fraud-api:
    build: .
    container_name: fraud-api
    ports:
      - "8000:8000"

prometheus:
  image: prom/prometheus:v2.50.1
  ports:
    - "9090:9090"
  volumes:
    - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
  depends_on:
    - fraud-api

  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
